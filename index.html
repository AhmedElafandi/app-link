<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Haddiya...</title>
    
    <link rel="dns-prefetch" href="//play.google.com">
    <link rel="dns-prefetch" href="//apps.apple.com">
    <link rel="preconnect" href="https://play.google.com">
    <link rel="preconnect" href="https://apps.apple.com">

    <script>
        (function() {
            const ua = navigator.userAgent.toLowerCase();
            
            const appStoreUrl = "https://apps.apple.com/app/id6752947035";
            const fallbackUrl = "https://haddiya.com";
            
            // The native Android intent that specifically targets the Google Play Store app
            const androidIntent = "intent://details?id=com.appsbunches.haddiya#Intent;scheme=market;package=com.android.vending;end";

            const isAndroid = ua.includes("android");
            const isIOS = ua.includes("iphone") || ua.includes("ipad") || ua.includes("ipod");
            const isInstagram = ua.includes("instagram");

            // 1. Handle Android Devices
            if (isAndroid) {
                // If they are in Instagram, auto-redirects might fail, but we attempt it anyway.
                // If it fails, they will rely on the fallback button we updated in the HTML below.
                if (isInstagram) {
                    window.location.href = androidIntent; 
                } else {
                    window.location.replace(androidIntent);
                }
            } 
            
            // 2. Handle iOS Devices (iPhone, iPad, iPod)
            else if (isIOS) {
                // Since this runs on GitHub, iOS requires a direct redirect to the App Store.
                window.location.replace(appStoreUrl);
            } 
            
            // 3. Desktop / Unsupported Devices Fallback
            else {
                window.location.replace(fallbackUrl);
            }
        })();
    </script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
        <h2>Connecting to Haddiya...</h2>
        <p>If you are not redirected automatically, please choose your store:</p>
        <div style="margin-top: 20px;">
            <a href="https://apps.apple.com/app/id6752947035" style="display: inline-block; padding: 10px 20px; background-color: #000; color: #fff; text-decoration: none; border-radius: 5px; margin: 5px;">App Store</a>
            
            <a href="intent://details?id=com.appsbunches.haddiya#Intent;scheme=market;package=com.android.vending;end" style="display: inline-block; padding: 10px 20px; background-color: #A4C639; color: #fff; text-decoration: none; border-radius: 5px; margin: 5px;">Google Play</a>
        </div>
    </div>

    <noscript>
        <p>If you are not redirected, click the appropriate link below:</p>
        <ul>
            <li><a href="intent://details?id=com.appsbunches.haddiya#Intent;scheme=market;package=com.android.vending;end">Google Play Store</a></li>
            <li><a href="https://apps.apple.com/app/id6752947035">Apple App Store</a></li>
        </ul>
    </noscript>
</body>
</html>
